<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1100 580" xmlns="http://www.w3.org/2000/svg">
          <defs>
<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.mono { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; }

.n-chip rect, .n-chip polygon { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }

.n-dec polygon { fill: #FFFFFF; stroke: #007755; stroke-width: 1.5; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 14px; }

.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }

.subgraph rect { fill: rgba(110,91,224,0.04); stroke: #6E5BE0; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph.vm rect { fill: rgba(0,179,89,0.04); stroke: #007755; }
.subgraph text.label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #6E5BE0; font-weight: 600; }
.subgraph.vm text.label { fill: #007755; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-self { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9.5px; fill: #7E7F8C; letter-spacing: 0.1em; }
]]></style><marker id="arr12" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker></defs>

          <g class="n-chip" transform="translate(40,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">cargo-zisk</text></g>
          <g class="n-chip" transform="translate(310,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Transpiler</text></g>
          <g class="n-chip" transform="translate(580,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Program ROM</text></g>
          <g class="n-chip" transform="translate(850,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Setup engine</text></g>

          <line class="seq-life" x1="130" y1="70" x2="130" y2="560"/>
          <line class="seq-life" x1="400" y1="70" x2="400" y2="560"/>
          <line class="seq-life" x1="670" y1="70" x2="670" y2="560"/>
          <line class="seq-life" x1="940" y1="70" x2="940" y2="560"/>

          <text class="seq-step-num" x="0" y="118">01</text>
          <path class="seq-msg" d="M 130 120 L 399 120" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="265" y="112" text-anchor="middle">load hash-guest.elf</text>

          <text class="seq-step-num" x="0" y="168">02</text>
          <path class="seq-self" d="M 400 170 C 510 170, 510 200, 400 200" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="525" y="184" text-anchor="start">walk every RISC-V instruction</text>

          <text class="seq-step-num" x="0" y="248">03</text>
          <path class="seq-self" d="M 400 250 C 510 250, 510 280, 400 280" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="525" y="264" text-anchor="start">emit matching ZisK instruction(s)</text>

          <text class="seq-step-num" x="0" y="328">04</text>
          <path class="seq-msg" d="M 400 330 L 669 330" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="535" y="322" text-anchor="middle">store transpiled instructions, keyed by address</text>

          <text class="seq-step-num" x="0" y="368">05</text>
          <path class="seq-msg" d="M 130 370 L 939 370" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="535" y="362" text-anchor="middle">hash ROM into program commitment</text>

          <text class="seq-step-num" x="0" y="408">06</text>
          <path class="seq-self" d="M 940 410 C 1050 410, 1050 440, 940 440" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="820" y="424" text-anchor="end">compute fixed columns of every AIR (lookup tables, instruction encodings)</text>

          <text class="seq-step-num" x="0" y="478">07</text>
          <path class="seq-self" d="M 940 480 C 1050 480, 1050 510, 940 510" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="820" y="494" text-anchor="end">precompute frequent-operation caches</text>

          <text class="seq-step-num" x="0" y="548">08</text>
          <path class="seq-msg-dashed" d="M 940 550 L 141 550" marker-end="url(#arr12)"/>
          <text class="seq-msg-label" x="535" y="542" text-anchor="middle">proving key + program commitment</text>
        </svg>
