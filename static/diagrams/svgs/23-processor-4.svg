<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1440 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
    ]]></style>
    <marker id="arr23" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-art" transform="translate(20,60)">
    <rect width="220" height="80" rx="8"/>
    <text class="kind" x="110" y="22" text-anchor="middle">source a</text>
    <text class="name" x="110" y="48" text-anchor="middle">IMM / MEM / REG</text>
    <text class="sub" x="110" y="64" text-anchor="middle">/ C / STEP</text>
  </g>
  <g class="n-art" transform="translate(20,220)">
    <rect width="220" height="80" rx="8"/>
    <text class="kind" x="110" y="22" text-anchor="middle">source b</text>
    <text class="name" x="110" y="48" text-anchor="middle">IMM / MEM / REG</text>
    <text class="sub" x="110" y="64" text-anchor="middle">/ C / IND</text>
  </g>

  <g class="n-chip" transform="translate(360,80)">
    <rect width="140" height="60" rx="8"/>
    <text class="kind" x="70" y="22" text-anchor="middle">register</text>
    <text class="name" x="70" y="44" text-anchor="middle">a</text>
  </g>
  <g class="n-chip" transform="translate(360,220)">
    <rect width="140" height="60" rx="8"/>
    <text class="kind" x="70" y="22" text-anchor="middle">register</text>
    <text class="name" x="70" y="44" text-anchor="middle">b</text>
  </g>

  <g class="n-chip" transform="translate(620,140)">
    <rect width="280" height="80" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">operation</text>
    <text class="name" x="140" y="52" text-anchor="middle">(c, flag) = op(a, b)</text>
  </g>

  <g class="n-chip" transform="translate(1020,80)">
    <rect width="140" height="60" rx="8"/>
    <text class="kind" x="70" y="22" text-anchor="middle">register</text>
    <text class="name" x="70" y="44" text-anchor="middle">c</text>
  </g>
  <g class="n-chip" transform="translate(1020,220)">
    <rect width="140" height="60" rx="8"/>
    <text class="kind" x="70" y="22" text-anchor="middle">register</text>
    <text class="name" x="70" y="44" text-anchor="middle">flag</text>
  </g>

  <g class="n-art" transform="translate(1220,80)">
    <rect width="200" height="80" rx="8"/>
    <text class="kind" x="100" y="22" text-anchor="middle">store c</text>
    <text class="name" x="100" y="48" text-anchor="middle">MEM / REG / IND</text>
    <text class="sub" x="100" y="64" text-anchor="middle">/ NONE</text>
  </g>

  <path class="edge" d="M 240 110 L 360 110" marker-end="url(#arr23)"/>
  <path class="edge" d="M 240 250 L 360 250" marker-end="url(#arr23)"/>
  <path class="edge" d="M 500 110 C 560 110, 580 175, 620 175" marker-end="url(#arr23)"/>
  <path class="edge" d="M 500 250 C 560 250, 580 185, 620 185" marker-end="url(#arr23)"/>
  <path class="edge" d="M 900 170 C 970 170, 980 110, 1020 110" marker-end="url(#arr23)"/>
  <path class="edge" d="M 900 190 C 970 190, 980 250, 1020 250" marker-end="url(#arr23)"/>
  <path class="edge" d="M 1160 110 L 1220 110" marker-end="url(#arr23)"/>
