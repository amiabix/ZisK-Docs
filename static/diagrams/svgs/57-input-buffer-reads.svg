  <g transform="translate(220,360)">
    <g class="byte-cell"><rect class="cell-f3-strong" x="0" y="0" width="62" height="40"/><text x="31" y="26" text-anchor="middle">5D</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="62" y="0" width="62" height="40"/><text x="93" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="124" y="0" width="62" height="40"/><text x="155" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="186" y="0" width="62" height="40"/><text x="217" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="248" y="0" width="62" height="40"/><text x="279" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="310" y="0" width="62" height="40"/><text x="341" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="372" y="0" width="62" height="40"/><text x="403" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="434" y="0" width="62" height="40"/><text x="465" y="26" text-anchor="middle">00</text></g>
  </g>

  <!-- Bottom legend -->
  <text class="row-label" x="220" y="450">strong fill = significant byte · dim fill = padding</text>
  <text class="row-label" x="220" y="470">each frame = 8-byte length + 8-byte value+padding (16 bytes total)</text>

  <!-- Connectors buffer → guest -->
  <path class="connector f1" d="M 760 130 C 850 130, 890 150, 970 150" marker-end="url(#arr-rf1)"/>
  <path class="connector f2" d="M 760 240 C 850 240, 890 260, 970 260" marker-end="url(#arr-rf2)"/>
  <path class="connector f3" d="M 760 350 C 850 350, 890 370, 970 370" marker-end="url(#arr-rf3)"/>

  <!-- Guest Program panel (RIGHT) -->
  <text class="panel-title" x="970" y="60">Guest Program</text>
  <rect class="panel-bg" x="970" y="80" width="470" height="380" rx="12"/>

  <g class="host-call-bg f1" transform="translate(1000,120)">
    <rect width="410" height="60" rx="8"/>
    <circle class="dot f1" cx="36" cy="30" r="14"/>
    <text class="frame-index" x="36" y="36" text-anchor="middle" fill="#FFFFFF">①</text>
    <text class="host-call" x="80" y="36">io::read::&lt;u8&gt;()  →  83</text>
  </g>

  <g class="host-call-bg f2" transform="translate(1000,230)">
    <rect width="410" height="60" rx="8"/>
    <circle class="dot f2" cx="36" cy="30" r="14"/>
    <text class="frame-index" x="36" y="36" text-anchor="middle" fill="#FFFFFF">②</text>
    <text class="host-call" x="80" y="36">io::read::&lt;u16&gt;()  →  66</text>
