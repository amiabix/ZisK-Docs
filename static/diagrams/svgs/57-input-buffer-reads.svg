    <g class="byte-cell byte-cell-dim"><rect class="cell-f1" x="186" y="0" width="62" height="40"/><text x="217" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f1" x="248" y="0" width="62" height="40"/><text x="279" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f1" x="310" y="0" width="62" height="40"/><text x="341" y="26" text-anchor="middle">00</text></g>
