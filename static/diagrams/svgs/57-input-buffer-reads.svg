  <g class="host-call-bg f3" transform="translate(1000,340)">
    <rect width="410" height="60" rx="8"/>
    <circle class="dot f3" cx="36" cy="30" r="14"/>
    <text class="frame-index" x="36" y="36" text-anchor="middle" fill="#FFFFFF">③</text>
    <text class="host-call" x="80" y="36">io::read::&lt;u8&gt;()  →  93</text>
  </g>
</svg>
