  <text class="row-label" x="95" y="266">value + padding</text>
  <g transform="translate(220,250)">
    <g class="byte-cell"><rect class="cell-f2-strong" x="0" y="0" width="62" height="40"/><text x="31" y="26" text-anchor="middle">42</text></g>
    <g class="byte-cell"><rect class="cell-f2-strong" x="62" y="0" width="62" height="40"/><text x="93" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f2" x="124" y="0" width="62" height="40"/><text x="155" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f2" x="186" y="0" width="62" height="40"/><text x="217" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f2" x="248" y="0" width="62" height="40"/><text x="279" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f2" x="310" y="0" width="62" height="40"/><text x="341" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f2" x="372" y="0" width="62" height="40"/><text x="403" y="26" text-anchor="middle">00</text></g>
