<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1340 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
    ]]></style>
    <marker id="arr34" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
    <marker id="arr34-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#7E7F8C"/></marker>
  </defs>

  <g class="n-chip" transform="translate(560,20)">
    <rect width="220" height="80" rx="8"/>
    <text class="kind" x="110" y="22" text-anchor="middle">execution spine</text>
    <text class="name" x="110" y="52" text-anchor="middle">Main</text>
  </g>

  <g class="n-chip" transform="translate(40,220)">
    <rect width="240" height="100" rx="8"/>
    <text class="kind" x="120" y="22" text-anchor="middle">specialist</text>
    <text class="name" x="120" y="48" text-anchor="middle">Base Operations</text>
    <text class="sub" x="120" y="70" text-anchor="middle">Arith, Binary, Shift, ...</text>
  </g>
  <g class="n-chip" transform="translate(360,220)">
    <rect width="280" height="100" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">specialist</text>
    <text class="name" x="140" y="48" text-anchor="middle">Precompiles</text>
    <text class="sub" x="140" y="70" text-anchor="middle">SHA, Keccak, secp256k1, ...</text>
  </g>
  <g class="n-chip" transform="translate(720,220)">
    <rect width="220" height="100" rx="8"/>
    <text class="kind" x="110" y="22" text-anchor="middle">specialist</text>
    <text class="name" x="110" y="58" text-anchor="middle">MemAlign</text>
  </g>

  <g class="n-art" transform="translate(220,460)">
    <rect width="200" height="80" rx="8"/>
    <text class="kind" x="100" y="22" text-anchor="middle">lookup</text>
    <text class="name" x="100" y="52" text-anchor="middle">Tables</text>
  </g>
  <g class="n-chip" transform="translate(820,460)">
    <rect width="240" height="80" rx="8"/>
    <text class="kind" x="120" y="22" text-anchor="middle">consistency</text>
    <text class="name" x="120" y="52" text-anchor="middle">Memory</text>
  </g>

  <!-- Main → Base Operations -->
  <path class="edge" d="M 620 100 C 580 130, 200 200, 160 218" marker-end="url(#arr34)"/>
  <text class="edge-label" x="380" y="160" text-anchor="middle">Op Bus</text>
  <!-- Main → Precompiles -->
  <path class="edge" d="M 660 100 C 640 130, 520 200, 500 218" marker-end="url(#arr34)"/>
  <text class="edge-label" x="580" y="170" text-anchor="middle">Op Bus</text>
  <!-- Main → MemAlign -->
  <path class="edge" d="M 720 100 C 740 130, 820 200, 830 218" marker-end="url(#arr34)"/>
  <text class="edge-label" x="800" y="170" text-anchor="middle">Memory Bus</text>
  <!-- Main → Memory dashed (aligned access) -->
  <path class="edge-dim" d="M 780 70 C 1100 70, 1180 350, 1010 458" marker-end="url(#arr34-dim)"/>
  <text class="edge-label" x="1180" y="220" text-anchor="middle" fill="#7E7F8C">aligned access</text>

  <!-- Precompiles → MemAlign -->
  <path class="edge" d="M 640 280 L 720 280" marker-end="url(#arr34)"/>
  <text class="edge-label" x="680" y="265" text-anchor="middle">Memory Bus</text>

  <!-- MemAlign → Memory -->
  <path class="edge" d="M 830 320 C 830 410, 940 430, 940 458" marker-end="url(#arr34)"/>
  <text class="edge-label" x="900" y="395" text-anchor="middle">aligned 8-byte</text>

  <!-- Base Ops → Tables -->
  <path class="edge" d="M 160 320 C 160 410, 320 430, 320 458" marker-end="url(#arr34)"/>
  <!-- Precompiles → Tables -->
  <path class="edge" d="M 500 320 C 500 410, 340 430, 340 458" marker-end="url(#arr34)"/>
</svg>
