<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1500 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }
    ]]></style>
    <marker id="arr37" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-chip" transform="translate(40,220)">
    <rect width="280" height="120" rx="8"/>
    <text class="kind" x="140" y="24" text-anchor="middle">execution spine</text>
    <text class="name" x="140" y="58" text-anchor="middle">Main chip · row r</text>
    <text class="sub" x="140" y="86" text-anchor="middle">x5 = x1 + x2</text>
  </g>

  <g class="n-chip" transform="translate(560,40)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">code</text><text class="name" x="110" y="52" text-anchor="middle">ROM chip</text></g>
  <g class="n-chip" transform="translate(560,240)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">consistency</text><text class="name" x="110" y="52" text-anchor="middle">Memory chip</text></g>
  <g class="n-chip" transform="translate(560,440)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">specialist</text><text class="name" x="110" y="52" text-anchor="middle">Arith chip</text></g>

  <!-- Main → ROM -->
  <path class="edge" d="M 320 250 C 420 250, 470 80, 560 80" marker-end="url(#arr37)"/>
  <text class="edge-label" x="450" y="155" text-anchor="middle">ROM Bus · fetch inst at pc</text>

  <!-- Main → Memory: read x1 -->
  <path class="edge" d="M 320 270 C 420 270, 470 270, 560 270" marker-end="url(#arr37)"/>
  <text class="edge-label" x="440" y="262" text-anchor="middle">Memory Bus · read x1</text>

  <!-- Main → Memory: read x2 -->
  <path class="edge" d="M 320 290 C 420 290, 470 290, 560 290" marker-end="url(#arr37)"/>
  <text class="edge-label" x="440" y="312" text-anchor="middle">Memory Bus · read x2</text>

  <!-- Main → Arith: dispatch -->
  <path class="edge" d="M 320 310 C 420 310, 470 470, 560 470" marker-end="url(#arr37)"/>
  <text class="edge-label" x="450" y="395" text-anchor="middle">Op Bus · add(x1, x2)</text>

  <!-- Arith → Main: result -->
  <path class="edge" d="M 560 480 C 470 480, 420 320, 320 320" marker-end="url(#arr37)"/>
  <text class="edge-label" x="450" y="430" text-anchor="middle" fill="#7E7F8C">Op Bus · result c</text>

  <!-- Main → Memory: write x5 -->
  <g class="n-chip" transform="translate(1080,240)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">write back</text><text class="name" x="110" y="52" text-anchor="middle">Memory · write x5</text></g>
  <path class="edge" d="M 780 280 L 1080 280" marker-end="url(#arr37)"/>
  <text class="edge-label" x="930" y="270" text-anchor="middle">Memory Bus · write x5</text>
</svg>
