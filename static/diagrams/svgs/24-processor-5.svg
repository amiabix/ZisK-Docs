<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 13px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 13px; }
.n-dec text.kind { fill: #007755; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.subgraph rect { fill: #F7F8FA; stroke: #D9DCE3; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph text.label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; fill: #4A4C59; font-weight: 600; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.3; }
    ]]></style>
    <marker id="arr24" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <!-- Source a subgraph (top-left) -->
  <g class="subgraph">
    <rect x="20" y="20" width="320" height="380" rx="12"/>
    <text class="label" x="40" y="48">source a modes</text>
  </g>
  <g class="n-art" transform="translate(40,70)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">IMM</text></g>
  <g class="n-art" transform="translate(40,135)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">MEM(addr)</text></g>
  <g class="n-art" transform="translate(40,200)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">REG(idx)</text></g>
  <g class="n-art" transform="translate(40,265)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">C: previous c</text></g>
  <g class="n-art" transform="translate(40,330)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">STEP: step counter</text></g>

  <!-- Source b subgraph (bottom-left) -->
  <g class="subgraph">
    <rect x="20" y="440" width="320" height="380" rx="12"/>
    <text class="label" x="40" y="468">source b modes</text>
  </g>
  <g class="n-art" transform="translate(40,490)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">IMM</text></g>
  <g class="n-art" transform="translate(40,555)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">MEM(addr)</text></g>
  <g class="n-art" transform="translate(40,620)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">REG(idx)</text></g>
  <g class="n-art" transform="translate(40,685)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">C: previous c</text></g>
  <g class="n-art" transform="translate(40,750)"><rect width="280" height="50" rx="6"/><text class="name" x="140" y="32" text-anchor="middle">IND: mem[a + offset]</text></g>

  <!-- Operand registers a, b -->
  <g class="n-chip" transform="translate(440,200)"><rect width="140" height="60" rx="8"/><text class="kind" x="70" y="22" text-anchor="middle">register</text><text class="name" x="70" y="44" text-anchor="middle">a</text></g>
  <g class="n-chip" transform="translate(440,620)"><rect width="140" height="60" rx="8"/><text class="kind" x="70" y="22" text-anchor="middle">register</text><text class="name" x="70" y="44" text-anchor="middle">b</text></g>

  <!-- Operation -->
  <g class="n-chip" transform="translate(680,400)"><rect width="280" height="80" rx="8"/><text class="kind" x="140" y="22" text-anchor="middle">operation</text><text class="name" x="140" y="52" text-anchor="middle" style="font-size:14px;">(c, flag) = op(a, b)</text></g>

  <!-- Result registers c, flag -->
  <g class="n-chip" transform="translate(1060,200)"><rect width="140" height="60" rx="8"/><text class="kind" x="70" y="22" text-anchor="middle">register</text><text class="name" x="70" y="44" text-anchor="middle">c</text></g>
  <g class="n-chip" transform="translate(1060,620)"><rect width="140" height="60" rx="8"/><text class="kind" x="70" y="22" text-anchor="middle">register</text><text class="name" x="70" y="44" text-anchor="middle">flag</text></g>

  <!-- Store c subgraph (top-right) -->
  <g class="subgraph">
    <rect x="1260" y="20" width="320" height="380" rx="12"/>
    <text class="label" x="1280" y="48">store c modes</text>
  </g>
  <g class="n-art" transform="translate(1280,80)"><rect width="280" height="60" rx="6"/><text class="name" x="140" y="36" text-anchor="middle">MEM(addr)</text></g>
  <g class="n-art" transform="translate(1280,160)"><rect width="280" height="60" rx="6"/><text class="name" x="140" y="36" text-anchor="middle">REG(idx)</text></g>
  <g class="n-art" transform="translate(1280,240)"><rect width="280" height="60" rx="6"/><text class="name" x="140" y="36" text-anchor="middle">IND: mem[a + offset]</text></g>
  <g class="n-art" transform="translate(1280,320)"><rect width="280" height="60" rx="6"/><text class="name" x="140" y="36" text-anchor="middle">NONE: discard</text></g>

  <!-- Set pc subgraph (bottom-right) -->
  <g class="subgraph">
    <rect x="1260" y="440" width="320" height="380" rx="12"/>
    <text class="label" x="1280" y="468">set pc</text>
  </g>
  <g class="n-dec" transform="translate(1280,490)"><rect width="280" height="80" rx="6"/><text class="kind" x="140" y="24" text-anchor="middle">flag = 1</text><text class="name" x="140" y="54" text-anchor="middle">pc ← pc + taken_offset</text></g>
  <g class="n-dec" transform="translate(1280,590)"><rect width="280" height="80" rx="6"/><text class="kind" x="140" y="24" text-anchor="middle">flag = 0</text><text class="name" x="140" y="54" text-anchor="middle">pc ← pc + not_taken_offset</text></g>
  <g class="n-dec" transform="translate(1280,690)"><rect width="280" height="80" rx="6"/><text class="kind" x="140" y="24" text-anchor="middle">jump</text><text class="name" x="140" y="54" text-anchor="middle">pc ← c + offset</text></g>

  <!-- All a sources → a -->
  <path class="edge" d="M 320 95 C 380 95, 400 220, 440 230" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 160 C 380 160, 400 225, 440 230" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 225 L 440 230" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 290 C 380 290, 400 235, 440 235" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 355 C 380 355, 400 240, 440 240" marker-end="url(#arr24)"/>

  <!-- All b sources → b -->
  <path class="edge" d="M 320 515 C 380 515, 400 640, 440 650" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 580 C 380 580, 400 645, 440 650" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 645 L 440 650" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 710 C 380 710, 400 655, 440 655" marker-end="url(#arr24)"/>
  <path class="edge" d="M 320 775 C 380 775, 400 660, 440 660" marker-end="url(#arr24)"/>

  <!-- a, b → op -->
  <path class="edge" d="M 580 230 C 640 230, 660 430, 680 440" marker-end="url(#arr24)"/>
  <path class="edge" d="M 580 650 C 640 650, 660 450, 680 440" marker-end="url(#arr24)"/>

  <!-- op → c, flag -->
  <path class="edge" d="M 960 420 C 1020 420, 1040 230, 1060 230" marker-end="url(#arr24)"/>
  <path class="edge" d="M 960 460 C 1020 460, 1040 650, 1060 650" marker-end="url(#arr24)"/>

  <!-- c → store modes -->
  <path class="edge" d="M 1200 220 C 1240 220, 1260 110, 1280 110" marker-end="url(#arr24)"/>
  <path class="edge" d="M 1200 225 C 1240 225, 1260 190, 1280 190" marker-end="url(#arr24)"/>
  <path class="edge" d="M 1200 230 C 1240 230, 1260 270, 1280 270" marker-end="url(#arr24)"/>
  <path class="edge" d="M 1200 235 C 1240 235, 1260 350, 1280 350" marker-end="url(#arr24)"/>

  <!-- flag → pc, c → jump -->
  <path class="edge" d="M 1200 645 C 1240 645, 1260 525, 1280 525" marker-end="url(#arr24)"/>
  <path class="edge" d="M 1200 650 C 1240 650, 1260 625, 1280 625" marker-end="url(#arr24)"/>
  <path class="edge" d="M 1200 240 C 1230 350, 1240 720, 1280 725" marker-end="url(#arr24)"/>
</svg>
