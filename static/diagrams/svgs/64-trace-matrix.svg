<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.cell rect { fill: #FFFFFF; stroke: #15161D; stroke-width: 1; }
.cell text { font-family: 'IBM Plex Mono', monospace; font-size: 14px; fill: #4A4C59; }
.cell-dim rect { fill: #F7F8FA; stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 3; }
.cell-dim text { font-family: 'IBM Plex Mono', monospace; font-size: 14px; fill: #B9B9C5; }
.col-label { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.04em; fill: #15161D; font-weight: 600; }
.row-label { font-family: 'IBM Plex Mono', monospace; font-size: 13px; fill: #15161D; font-weight: 600; }
.axis-arrow { stroke: #4A4C59; stroke-width: 1.4; fill: none; }
.caption { font-family: 'IBM Plex Mono', monospace; font-size: 16px; fill: #15161D; font-weight: 700; letter-spacing: 0.04em; }
.caption-sub { font-family: 'IBM Plex Mono', monospace; font-size: 12px; fill: #4A4C59; }
.dim-marker { font-family: 'IBM Plex Mono', monospace; font-size: 12px; fill: #4A4C59; }
    ]]></style>
    <marker id="arr-axis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#4A4C59"/></marker>
  </defs>

  <!-- Column headers (top) -->
  <text class="col-label" x="240" y="60" text-anchor="middle">col 0</text>
  <text class="col-label" x="380" y="60" text-anchor="middle">col 1</text>
  <text class="col-label" x="520" y="60" text-anchor="middle">col 2</text>
  <text class="col-label" x="660" y="60" text-anchor="middle">···</text>
  <text class="col-label" x="800" y="60" text-anchor="middle">col W−1</text>

  <!-- Row 0 -->
  <text class="row-label" x="140" y="115" text-anchor="end">0</text>
  <g class="cell"><rect x="170" y="90" width="140" height="50"/><text x="240" y="120" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="310" y="90" width="140" height="50"/><text x="380" y="120" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="450" y="90" width="140" height="50"/><text x="520" y="120" text-anchor="middle">…</text></g>
  <g class="cell-dim"><rect x="590" y="90" width="140" height="50"/><text x="660" y="120" text-anchor="middle">···</text></g>
  <g class="cell"><rect x="730" y="90" width="140" height="50"/><text x="800" y="120" text-anchor="middle">…</text></g>

  <!-- Row 1 -->
  <text class="row-label" x="140" y="175" text-anchor="end">1</text>
  <g class="cell"><rect x="170" y="150" width="140" height="50"/><text x="240" y="180" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="310" y="150" width="140" height="50"/><text x="380" y="180" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="450" y="150" width="140" height="50"/><text x="520" y="180" text-anchor="middle">…</text></g>
  <g class="cell-dim"><rect x="590" y="150" width="140" height="50"/><text x="660" y="180" text-anchor="middle">···</text></g>
  <g class="cell"><rect x="730" y="150" width="140" height="50"/><text x="800" y="180" text-anchor="middle">…</text></g>

  <!-- Row 2 -->
  <text class="row-label" x="140" y="235" text-anchor="end">2</text>
  <g class="cell"><rect x="170" y="210" width="140" height="50"/><text x="240" y="240" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="310" y="210" width="140" height="50"/><text x="380" y="240" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="450" y="210" width="140" height="50"/><text x="520" y="240" text-anchor="middle">…</text></g>
  <g class="cell-dim"><rect x="590" y="210" width="140" height="50"/><text x="660" y="240" text-anchor="middle">···</text></g>
  <g class="cell"><rect x="730" y="210" width="140" height="50"/><text x="800" y="240" text-anchor="middle">…</text></g>

  <!-- Row ⋮ (vertical ellipsis row, dimmed) -->
  <text class="row-label" x="140" y="295" text-anchor="end">⋮</text>
  <g class="cell-dim"><rect x="170" y="270" width="140" height="50"/><text x="240" y="302" text-anchor="middle">⋮</text></g>
  <g class="cell-dim"><rect x="310" y="270" width="140" height="50"/><text x="380" y="302" text-anchor="middle">⋮</text></g>
  <g class="cell-dim"><rect x="450" y="270" width="140" height="50"/><text x="520" y="302" text-anchor="middle">⋮</text></g>
  <g class="cell-dim"><rect x="590" y="270" width="140" height="50"/><text x="660" y="302" text-anchor="middle">⋱</text></g>
  <g class="cell-dim"><rect x="730" y="270" width="140" height="50"/><text x="800" y="302" text-anchor="middle">⋮</text></g>

  <!-- Row N-1 -->
  <text class="row-label" x="140" y="355" text-anchor="end">N−1</text>
  <g class="cell"><rect x="170" y="330" width="140" height="50"/><text x="240" y="360" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="310" y="330" width="140" height="50"/><text x="380" y="360" text-anchor="middle">…</text></g>
  <g class="cell"><rect x="450" y="330" width="140" height="50"/><text x="520" y="360" text-anchor="middle">…</text></g>
  <g class="cell-dim"><rect x="590" y="330" width="140" height="50"/><text x="660" y="360" text-anchor="middle">···</text></g>
  <g class="cell"><rect x="730" y="330" width="140" height="50"/><text x="800" y="360" text-anchor="middle">…</text></g>

  <!-- Dimension annotations -->
  <!-- Width brace (top) -->
  <path class="axis-arrow" d="M 170 40 L 870 40" marker-end="url(#arr-axis)"/>
  <path class="axis-arrow" d="M 870 40 L 170 40" marker-end="url(#arr-axis)" style="opacity:0;"/>
  <text class="dim-marker" x="520" y="30" text-anchor="middle">W columns (width)</text>

  <!-- Height brace (left) -->
  <path class="axis-arrow" d="M 110 90 L 110 380" marker-end="url(#arr-axis)"/>
  <text class="dim-marker" x="40" y="240" text-anchor="middle" transform="rotate(-90 40 240)">N rows (height)</text>

  <!-- Caption with arrow up -->
  <path class="axis-arrow" d="M 520 480 L 520 410" marker-end="url(#arr-axis)"/>
  <text class="caption" x="520" y="530" text-anchor="middle">trace matrix T ∈ 𝔽^(N × W)</text>
</svg>
