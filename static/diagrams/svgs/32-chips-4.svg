<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1500 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
    ]]></style>
    <marker id="arr32" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-chip" transform="translate(20,60)">
    <rect width="320" height="100" rx="8"/>
    <text class="kind" x="160" y="22" text-anchor="middle">execution spine</text>
    <text class="name" x="160" y="50" text-anchor="middle">Main trace</text>
    <text class="sub" x="160" y="70" text-anchor="middle">phantom calling-convention insts</text>
  </g>

  <g class="n-chip" transform="translate(560,60)">
    <rect width="320" height="100" rx="8"/>
    <text class="kind" x="160" y="22" text-anchor="middle">specialist</text>
    <text class="name" x="160" y="50" text-anchor="middle">Precompile chip</text>
    <text class="sub" x="160" y="70" text-anchor="middle">many internal rows</text>
  </g>

  <g class="n-chip" transform="translate(1100,60)">
    <rect width="320" height="100" rx="8"/>
    <text class="kind" x="160" y="22" text-anchor="middle">consistency</text>
    <text class="name" x="160" y="60" text-anchor="middle">Memory</text>
  </g>

  <path class="edge" d="M 340 110 L 560 110" marker-end="url(#arr32)"/>
  <text class="edge-label" x="450" y="92" text-anchor="middle">Op Bus · dispatch</text>

  <path class="edge" d="M 880 110 L 1100 110" marker-end="url(#arr32)"/>
  <text class="edge-label" x="990" y="92" text-anchor="middle">Memory Bus · read inputs / write outputs</text>
</svg>
