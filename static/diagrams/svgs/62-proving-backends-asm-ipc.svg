<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1500 1860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 13px; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.subgraph rect { fill: #F7F8FA; stroke: #D9DCE3; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph text.label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; fill: #4A4C59; font-weight: 600; }
.section-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; fill: #4A4C59; font-weight: 600; }
.panel-header { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; fill: #15161D; font-weight: 700; }
.badge { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; fill: #7E7F8C; letter-spacing: 0.12em; text-transform: uppercase; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.divider { stroke: #D9DCE3; stroke-width: 1; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-msg-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; fill: #15161D; font-weight: 500; }
.seq-step-num { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #7E7F8C; letter-spacing: 0.1em; }
.activation rect { fill: rgba(0,119,85,0.12); stroke: #007755; stroke-width: 1.2; }
.activation.highlight rect { fill: rgba(199,163,0,0.15); stroke: #C7A300; stroke-width: 1.5; }
.activation text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #15161D; font-weight: 600; }
.activation text.sub { fill: #4A4C59; font-weight: 400; }
    ]]></style>
    <marker id="arr62a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
    <marker id="arr62a-start" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M9,0 L0,5 L9,10 z" fill="#15161D"/></marker>
  </defs>

  <!-- ============ PANEL A: TOPOLOGY ============ -->
  <text class="panel-header" x="40" y="40">PANEL A · Topology</text>
  <text class="badge" x="1460" y="40" text-anchor="end">Linux · x86_64 only</text>

  <!-- Host Rust process subgraph -->
  <g class="subgraph">
    <rect x="40" y="70" width="640" height="240" rx="12"/>
    <text class="label" x="60" y="98">Host Rust process · cargo-zisk / SDK</text>
  </g>
  <g class="n-chip" transform="translate(120,170)">
    <rect width="480" height="100" rx="8"/>
    <text class="kind" x="240" y="22" text-anchor="middle">runner wrapper</text>
    <text class="name" x="240" y="56" text-anchor="middle">AsmRunnerMO / MT / RH</text>
    <text class="sub" x="240" y="78" text-anchor="middle">orchestrates inputs · collects outputs</text>
  </g>

  <!-- ASM child process subgraph -->
  <g class="subgraph">
    <rect x="820" y="70" width="640" height="240" rx="12"/>
    <text class="label" x="840" y="98">ASM child process · forked</text>
  </g>
  <g class="n-chip" transform="translate(900,170)">
    <rect width="480" height="100" rx="8"/>
    <text class="kind" x="240" y="22" text-anchor="middle">precompiled x86-64 ELF</text>
    <text class="name" x="240" y="56" text-anchor="middle">hand-written ASM hot loop</text>
    <text class="sub" x="240" y="78" text-anchor="middle">RV64IMA execution</text>
  </g>

  <!-- Outer shared subgraph -->
  <g class="subgraph">
    <rect x="40" y="390" width="1420" height="500" rx="12"/>
    <text class="label" x="60" y="418">Shared between processes · POSIX IPC</text>
  </g>

  <!-- Named semaphores subsection -->
  <text class="section-label" x="380" y="458">named semaphores · POSIX</text>
  <g class="subgraph">
    <rect x="380" y="470" width="740" height="170" rx="10"/>
  </g>
  <g class="n-art" transform="translate(410,488)"><rect width="680" height="42" rx="6"/><text class="name" x="20" y="26">inputs_ready</text><text class="sub" x="660" y="26" text-anchor="end">host signals "request ready"</text></g>
  <g class="n-art" transform="translate(410,540)"><rect width="680" height="42" rx="6"/><text class="name" x="20" y="26">outputs_ready</text><text class="sub" x="660" y="26" text-anchor="end">child signals "outputs available"</text></g>
  <g class="n-art" transform="translate(410,592)"><rect width="680" height="42" rx="6"/><text class="name" x="20" y="26">done</text><text class="sub" x="660" y="26" text-anchor="end">child signals "execution complete"</text></g>

  <!-- Shared memory subsection -->
  <text class="section-label" x="380" y="678">shared memory · mmap · POSIX SHM</text>
  <g class="subgraph">
    <rect x="380" y="690" width="740" height="180" rx="10"/>
  </g>
  <g class="n-art" transform="translate(410,706)"><rect width="680" height="36" rx="6"/><text class="name" x="20" y="24">inputs region</text><text class="sub" x="660" y="24" text-anchor="end">host writes · child reads</text></g>
  <g class="n-art" transform="translate(410,748)"><rect width="680" height="36" rx="6"/><text class="name" x="20" y="24">outputs region</text><text class="sub" x="660" y="24" text-anchor="end">child writes · host reads</text></g>
  <g class="n-art" transform="translate(410,790)"><rect width="680" height="36" rx="6"/><text class="name" x="20" y="24">hints region</text><text class="sub" x="660" y="24" text-anchor="end">host pre-computed witnesses</text></g>
  <g class="n-art" transform="translate(410,832)"><rect width="680" height="36" rx="6"/><text class="name" x="20" y="24">control region</text><text class="sub" x="660" y="24" text-anchor="end">cursors · status flags</text></g>

  <!-- Bidirectional access arrows: 2 per process, one to sems block, one to shm block -->
  <!-- Host process → sems -->
  <path class="edge" d="M 180 310 C 180 380, 380 460, 380 555" marker-end="url(#arr62a)" marker-start="url(#arr62a-start)"/>
  <!-- Host process → shm -->
  <path class="edge" d="M 220 310 C 220 480, 380 720, 380 778" marker-end="url(#arr62a)" marker-start="url(#arr62a-start)"/>
  <!-- ASM process → sems -->
  <path class="edge" d="M 1280 310 C 1280 380, 1120 460, 1120 555" marker-end="url(#arr62a)" marker-start="url(#arr62a-start)"/>
  <!-- ASM process → shm -->
  <path class="edge" d="M 1320 310 C 1320 480, 1120 720, 1120 778" marker-end="url(#arr62a)" marker-start="url(#arr62a-start)"/>

  <text class="badge" x="750" y="930" text-anchor="middle">bidirectional access · both processes attach to sems + shm</text>

  <!-- Panel divider -->
  <line class="divider" x1="40" y1="970" x2="1460" y2="970"/>

  <!-- ============ PANEL B: SEQUENCE FLOW ============ -->
  <text class="panel-header" x="40" y="1010">PANEL B · One prove call</text>

  <!-- Lifeline headers -->
  <g class="n-chip" transform="translate(80,1040)"><rect width="260" height="50" rx="6"/><text class="name" x="130" y="32" text-anchor="middle">SDK / cargo-zisk</text></g>
  <g class="n-chip" transform="translate(580,1040)"><rect width="260" height="50" rx="6"/><text class="name" x="130" y="32" text-anchor="middle">ASM subprocess</text></g>
  <g class="n-chip" transform="translate(1080,1040)"><rect width="260" height="50" rx="6"/><text class="name" x="130" y="32" text-anchor="middle">Prover backend</text></g>

  <!-- Lifelines -->
  <line class="seq-life" x1="210" y1="1090" x2="210" y2="1830"/>
  <line class="seq-life" x1="710" y1="1090" x2="710" y2="1830"/>
  <line class="seq-life" x1="1210" y1="1090" x2="1210" y2="1830"/>

  <!-- Step 01: fork + exec -->
  <text class="seq-step-num" x="20" y="1138">01</text>
  <path class="seq-msg" d="M 210 1140 L 709 1140" marker-end="url(#arr62a)"/>
  <text class="seq-msg-label" x="460" y="1130" text-anchor="middle">fork() + exec</text>

  <!-- Step 02: open shm + sem (both sides) -->
  <text class="seq-step-num" x="20" y="1188">02</text>
  <path class="seq-msg" d="M 210 1190 L 709 1190" marker-end="url(#arr62a)"/>
  <text class="seq-msg-label" x="460" y="1180" text-anchor="middle">open shm + sem · write inputs region</text>
  <text class="seq-msg-label" x="460" y="1206" text-anchor="middle">sem_post inputs_ready</text>

  <!-- Activation: ASM child runs guest (highlighted) -->
  <g class="activation highlight">
    <rect x="600" y="1240" width="220" height="180" rx="6"/>
    <text x="710" y="1268" text-anchor="middle">run guest in isolation</text>
    <text x="710" y="1290" text-anchor="middle" class="sub">tight ASM hot loop</text>
    <text x="710" y="1330" text-anchor="middle">write outputs region</text>
    <text x="710" y="1360" text-anchor="middle">sem_post done</text>
    <text x="710" y="1396" text-anchor="middle" class="sub">invisible to host</text>
  </g>

  <!-- Step 03a: ASM → SDK · sem_post done (the trigger arrow) -->
  <text class="seq-step-num" x="20" y="1448">03a</text>
  <path class="seq-msg" d="M 710 1450 L 221 1450" marker-end="url(#arr62a)"/>
  <text class="seq-msg-label" x="460" y="1438" text-anchor="middle">sem_post done</text>

  <!-- Step 03b: SDK self-loop · side-effects after waking -->
  <text class="seq-step-num" x="20" y="1488">03b</text>
  <g class="activation">
    <rect x="100" y="1480" width="220" height="60" rx="6"/>
    <text x="210" y="1504" text-anchor="middle">read outputs region</text>
    <text x="210" y="1524" text-anchor="middle">reap child</text>
  </g>

  <!-- Step 04: SDK → Prover backend -->
  <text class="seq-step-num" x="20" y="1578">04</text>
  <path class="seq-msg" d="M 210 1580 L 1209 1580" marker-end="url(#arr62a)"/>
  <text class="seq-msg-label" x="710" y="1570" text-anchor="middle">pass trace + outputs</text>

  <!-- Activation: Prover backend -->
  <g class="activation">
    <rect x="1100" y="1620" width="220" height="160" rx="6"/>
    <text x="1210" y="1652" text-anchor="middle">STARK witness</text>
    <text x="1210" y="1690" text-anchor="middle">STARK proof</text>
    <text x="1210" y="1728" text-anchor="middle" class="sub">(optional PLONK)</text>
  </g>

  <!-- Step 05: Prover → SDK (proof returned, synchronous) -->
  <text class="seq-step-num" x="20" y="1808">05</text>
  <path class="seq-msg" d="M 1210 1810 L 221 1810" marker-end="url(#arr62a)"/>
  <text class="seq-msg-label" x="710" y="1800" text-anchor="middle">proof returned</text>
</svg>
