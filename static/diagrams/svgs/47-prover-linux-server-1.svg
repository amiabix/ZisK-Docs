<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1500 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.subgraph rect { fill: #F7F8FA; stroke: #D9DCE3; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph text.label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; fill: #4A4C59; font-weight: 600; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
    ]]></style>
    <marker id="arr47" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <!-- Worker host A -->
  <g class="subgraph">
    <rect x="40" y="40" width="380" height="180" rx="12"/>
    <text class="label" x="60" y="68">Worker host A · 32 units</text>
  </g>
  <g class="n-chip" transform="translate(80,100)">
    <rect width="300" height="100" rx="8"/>
    <text class="kind" x="150" y="22" text-anchor="middle">service</text>
    <text class="name" x="150" y="58" text-anchor="middle">zisk-worker</text>
  </g>

  <!-- Worker host B -->
  <g class="subgraph">
    <rect x="40" y="260" width="380" height="180" rx="12"/>
    <text class="label" x="60" y="288">Worker host B · 32 units</text>
  </g>
  <g class="n-chip" transform="translate(80,320)">
    <rect width="300" height="100" rx="8"/>
    <text class="kind" x="150" y="22" text-anchor="middle">service</text>
    <text class="name" x="150" y="58" text-anchor="middle">zisk-worker</text>
  </g>

  <!-- Coordinator host -->
  <g class="subgraph">
    <rect x="700" y="40" width="700" height="400" rx="12"/>
    <text class="label" x="720" y="68">Coordinator host</text>
  </g>
  <g class="n-chip" transform="translate(800,140)">
    <rect width="500" height="200" rx="8"/>
    <text class="kind" x="250" y="22" text-anchor="middle">service</text>
    <text class="name" x="250" y="62" text-anchor="middle">zisk-coordinator</text>
    <text class="sub" x="250" y="98" text-anchor="middle">:7000 (API)</text>
    <text class="sub" x="250" y="124" text-anchor="middle">:50051 (workers)</text>
    <text class="sub" x="250" y="150" text-anchor="middle">:9090 (metrics)</text>
  </g>

  <path class="edge" d="M 380 150 C 580 150, 680 220, 800 220" marker-end="url(#arr47)"/>
  <text class="edge-label" x="580" y="180" text-anchor="middle">:50051</text>

  <path class="edge" d="M 380 370 C 580 370, 680 270, 800 270" marker-end="url(#arr47)"/>
  <text class="edge-label" x="580" y="335" text-anchor="middle">:50051</text>
</svg>
