<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1700 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-out text.sub { fill: #007755; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
    ]]></style>
    <marker id="arr42" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-art" transform="translate(20,80)">
    <rect width="200" height="100" rx="8"/>
    <text class="kind" x="100" y="22" text-anchor="middle">anchor</text>
    <text class="name" x="100" y="56" text-anchor="middle">genesis</text>
    <text class="sub" x="100" y="78" text-anchor="middle">initial state</text>
  </g>

  <g class="n-chip" transform="translate(310,90)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">segment</text><text class="name" x="100" y="50" text-anchor="middle">Segment 0</text></g>
  <g class="n-chip" transform="translate(610,90)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">segment</text><text class="name" x="100" y="50" text-anchor="middle">Segment 1</text></g>
  <g class="n-chip" transform="translate(910,90)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">segment</text><text class="name" x="100" y="50" text-anchor="middle">…</text></g>
  <g class="n-chip" transform="translate(1210,90)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">segment</text><text class="name" x="100" y="50" text-anchor="middle">Segment n</text></g>

  <g class="n-out" transform="translate(1500,80)">
    <rect width="200" height="100" rx="8"/>
    <text class="kind" x="100" y="22" text-anchor="middle">anchor</text>
    <text class="name" x="100" y="56" text-anchor="middle">terminus</text>
    <text class="sub" x="100" y="78" text-anchor="middle">checks end pc</text>
  </g>

  <path class="edge" d="M 220 130 L 310 130" marker-end="url(#arr42)"/>
  <text class="edge-label" x="265" y="118" text-anchor="middle">Continuation Bus</text>

  <path class="edge" d="M 510 130 L 610 130" marker-end="url(#arr42)"/>
  <text class="edge-label" x="560" y="118" text-anchor="middle">final state</text>

  <path class="edge" d="M 810 130 L 910 130" marker-end="url(#arr42)"/>
  <text class="edge-label" x="860" y="118" text-anchor="middle">final state</text>

  <path class="edge" d="M 1110 130 L 1210 130" marker-end="url(#arr42)"/>
  <text class="edge-label" x="1160" y="118" text-anchor="middle">final state</text>

  <path class="edge" d="M 1410 130 L 1500 130" marker-end="url(#arr42)"/>
  <text class="edge-label" x="1455" y="118" text-anchor="middle">final handoff</text>
</svg>
