<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1240 620" xmlns="http://www.w3.org/2000/svg">
          <defs>
<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.mono { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; }

.n-chip rect, .n-chip polygon { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }

.n-dec polygon { fill: #FFFFFF; stroke: #007755; stroke-width: 1.5; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 14px; }

.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }

.subgraph rect { fill: rgba(110,91,224,0.04); stroke: #6E5BE0; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph.vm rect { fill: rgba(0,179,89,0.04); stroke: #007755; }
.subgraph text.label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #6E5BE0; font-weight: 600; }
.subgraph.vm text.label { fill: #007755; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-self { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9.5px; fill: #7E7F8C; letter-spacing: 0.1em; }
]]></style><marker id="arr6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker></defs>

          <!-- Main at top center -->
          <g class="n-chip" transform="translate(500,20)"><rect width="240" height="80" rx="8"/><text class="kind" x="120" y="22" text-anchor="middle">execution spine</text><text class="name" x="120" y="52" text-anchor="middle">Main</text></g>

          <!-- Row 2: 4 chips evenly distributed -->
          <g class="n-chip" transform="translate(40,240)"><rect width="200" height="100" rx="8"/><text class="kind" x="100" y="24" text-anchor="middle">code source</text><text class="name" x="100" y="56" text-anchor="middle">Program ROM</text></g>
          <g class="n-chip" transform="translate(300,240)"><rect width="220" height="100" rx="8"/><text class="kind" x="110" y="24" text-anchor="middle">specialist</text><text class="name" x="110" y="50" text-anchor="middle">Base Operations</text><text class="sub" x="110" y="74" text-anchor="middle">Arith, Binary, Shift, ...</text></g>
          <g class="n-chip" transform="translate(580,240)"><rect width="280" height="100" rx="8"/><text class="kind" x="140" y="24" text-anchor="middle">specialist</text><text class="name" x="140" y="50" text-anchor="middle">Precompiles</text><text class="sub" x="140" y="74" text-anchor="middle">SHA, Keccak, secp256k1, ...</text></g>
          <g class="n-chip" transform="translate(920,240)"><rect width="220" height="100" rx="8"/><text class="kind" x="110" y="24" text-anchor="middle">specialist</text><text class="name" x="110" y="56" text-anchor="middle">MemAlign</text></g>

          <!-- Row 3: Tables centered between BaseOps & Precompiles, Memory centered between Precompiles & MemAlign -->
          <g class="n-chip" transform="translate(440,490)"><rect width="240" height="90" rx="8"/><text class="kind" x="120" y="24" text-anchor="middle">lookup</text><text class="name" x="120" y="56" text-anchor="middle">Tables</text></g>
          <g class="n-chip" transform="translate(800,490)"><rect width="240" height="90" rx="8"/><text class="kind" x="120" y="24" text-anchor="middle">consistency</text><text class="name" x="120" y="56" text-anchor="middle">Memory</text></g>

          <!-- Main fan-out (Main bottom y=100, Row 2 top y=240) -->
          <!-- Main centers: bottom (620, 100). Row 2 centers (top): ROM(140,240), BaseOps(410,240), Precompiles(720,240), MemAlign(1030,240) -->
          <path class="edge" d="M 560 100 C 480 140, 200 200, 140 238" marker-end="url(#arr6)"/>
          <path class="edge" d="M 600 100 C 560 150, 420 200, 410 238" marker-end="url(#arr6)"/>
          <path class="edge" d="M 640 100 C 680 150, 720 200, 720 238" marker-end="url(#arr6)"/>
          <path class="edge" d="M 680 100 C 760 150, 1000 200, 1030 238" marker-end="url(#arr6)"/>

          <!-- Edge labels (lifted above row 2, centered horizontally on each arrow midpoint) -->
          <text class="edge-label mono" x="180" y="178" text-anchor="middle">fetch</text>
          <text class="edge-label mono" x="430" y="178" text-anchor="middle">simple ops</text>
          <text class="edge-label mono" x="720" y="178" text-anchor="middle">crypto / DMA</text>
          <text class="edge-label mono" x="970" y="178" text-anchor="middle">sub-word access</text>

          <!-- Row 2 -> Row 3: symmetric V's -->
          <!-- BaseOps(410, 340) -> Tables(560, 488) -->
          <path class="edge" d="M 410 340 C 410 410, 560 420, 560 488" marker-end="url(#arr6)"/>
          <!-- Precompiles(720, 340) -> Tables(560, 488) -->
          <path class="edge" d="M 720 340 C 720 410, 560 420, 560 488" marker-end="url(#arr6)"/>
          <!-- Precompiles(720, 340) -> Memory(920, 488) -->
          <path class="edge" d="M 720 340 C 720 410, 920 420, 920 488" marker-end="url(#arr6)"/>
          <!-- MemAlign(1030, 340) -> Memory(920, 488) -->
          <path class="edge" d="M 1030 340 C 1030 410, 920 420, 920 488" marker-end="url(#arr6)"/>
        </svg>
