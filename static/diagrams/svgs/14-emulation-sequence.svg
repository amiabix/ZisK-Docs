<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg">
          <defs>
<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.mono { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; }

.n-chip rect, .n-chip polygon { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }

.n-dec polygon { fill: #FFFFFF; stroke: #007755; stroke-width: 1.5; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 14px; }

.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }

.subgraph rect { fill: rgba(110,91,224,0.04); stroke: #6E5BE0; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph.vm rect { fill: rgba(0,179,89,0.04); stroke: #007755; }
.subgraph text.label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #6E5BE0; font-weight: 600; }
.subgraph.vm text.label { fill: #007755; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-self { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9.5px; fill: #7E7F8C; letter-spacing: 0.1em; }
]]></style><marker id="arr14" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker></defs>

          <g class="n-chip" transform="translate(80,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Emulator</text></g>
          <g class="n-chip" transform="translate(450,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Guest (in zkVM)</text></g>
          <g class="n-chip" transform="translate(820,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Execution log</text></g>

          <line class="seq-life" x1="170" y1="70" x2="170" y2="680"/>
          <line class="seq-life" x1="540" y1="70" x2="540" y2="680"/>
          <line class="seq-life" x1="910" y1="70" x2="910" y2="680"/>

          <text class="seq-step-num" x="20" y="118">00</text>
          <path class="seq-msg" d="M 170 120 L 539 120" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="355" y="112" text-anchor="middle">pc = ROM_ENTRY</text>

          <!-- Loop bracket -->
          <rect x="40" y="140" width="1020" height="450" fill="none" stroke="#7E7F8C" stroke-dasharray="6 4" stroke-width="1" rx="6"/>
          <rect x="50" y="132" width="220" height="20" fill="#FFFFFF" stroke="none"/>
          <text class="seq-step-num" x="60" y="146" fill="#15161D" style="font-size:10.5px;">LOOP · one ZisK instruction per step</text>

          <text class="seq-step-num" x="20" y="178">01</text>
          <path class="seq-msg" d="M 170 180 L 539 180" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="355" y="172" text-anchor="middle">fetch instruction at pc</text>

          <text class="seq-step-num" x="20" y="218">02</text>
          <path class="seq-msg" d="M 540 220 L 909 220" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="725" y="212" text-anchor="middle">record (pc, instruction)</text>

          <text class="seq-step-num" x="20" y="258">03</text>
          <path class="seq-msg" d="M 170 260 L 539 260" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="355" y="252" text-anchor="middle">resolve operands a, b</text>

          <text class="seq-step-num" x="20" y="298">04</text>
          <path class="seq-msg" d="M 540 300 L 909 300" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="725" y="292" text-anchor="middle">record memory reads</text>

          <text class="seq-step-num" x="20" y="338">05</text>
          <path class="seq-msg" d="M 170 340 L 539 340" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="355" y="332" text-anchor="middle">execute op(a, b)</text>

          <text class="seq-step-num" x="20" y="378">06</text>
          <path class="seq-msg" d="M 540 380 L 909 380" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="725" y="372" text-anchor="middle">record result c, flag</text>

          <text class="seq-step-num" x="20" y="418">07</text>
          <path class="seq-msg" d="M 170 420 L 539 420" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="355" y="412" text-anchor="middle">write c to destination</text>

          <text class="seq-step-num" x="20" y="458">08</text>
          <path class="seq-msg" d="M 540 460 L 909 460" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="725" y="452" text-anchor="middle">record memory write</text>

          <g class="seq-note">
            <rect x="370" y="480" width="340" height="50"/>
            <text x="540" y="498" text-anchor="middle">SHA-256 call?</text>
            <text x="540" y="515" text-anchor="middle">→ Log records precompile invocation</text>
          </g>

          <text class="seq-step-num" x="20" y="558">09</text>
          <path class="seq-msg" d="M 170 560 L 539 560" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="355" y="552" text-anchor="middle">pc = next_pc</text>

          <text class="seq-step-num" x="20" y="628">10</text>
          <path class="seq-msg-dashed" d="M 540 630 L 181 630" marker-end="url(#arr14)"/>
          <text class="seq-msg-label" x="355" y="622" text-anchor="middle">halt at exit address</text>
        </svg>
