<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1200 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-start circle { fill: #15161D; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
    ]]></style>
    <marker id="arr49" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <!-- Start node -->
  <g class="n-start"><circle cx="80" cy="270" r="12"/></g>

  <!-- Active states -->
  <g class="n-chip" transform="translate(180,230)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">active</text><text class="name" x="100" y="52" text-anchor="middle">Queued</text></g>
  <g class="n-chip" transform="translate(480,230)"><rect width="240" height="80" rx="8"/><text class="kind" x="120" y="22" text-anchor="middle">active</text><text class="name" x="120" y="52" text-anchor="middle">Running</text></g>
  <g class="n-chip" transform="translate(180,420)"><rect width="240" height="80" rx="8"/><text class="kind" x="120" y="22" text-anchor="middle">active</text><text class="name" x="120" y="52" text-anchor="middle">WaitingForInput</text></g>

  <!-- Terminal states -->
  <g class="n-out" transform="translate(820,80)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">terminal</text><text class="name" x="100" y="46" text-anchor="middle">Completed</text></g>
  <g class="n-out" transform="translate(820,240)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">terminal</text><text class="name" x="100" y="46" text-anchor="middle">Failed</text></g>
  <g class="n-out" transform="translate(820,400)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">terminal</text><text class="name" x="100" y="46" text-anchor="middle">Cancelled</text></g>

  <!-- End node -->
  <g class="n-start"><circle cx="1130" cy="270" r="12"/><circle cx="1130" cy="270" r="6" fill="#FFFFFF"/></g>

  <!-- Start → Queued -->
  <path class="edge" d="M 92 270 L 180 270" marker-end="url(#arr49)"/>

  <!-- Queued → Running -->
  <path class="edge" d="M 380 260 L 480 260" marker-end="url(#arr49)"/>

  <!-- Queued → WaitingForInput -->
  <path class="edge" d="M 280 310 L 280 418" marker-end="url(#arr49)"/>

  <!-- WaitingForInput → Running -->
  <path class="edge" d="M 420 460 C 540 460, 580 320, 580 310" marker-end="url(#arr49)"/>

  <!-- Running → Completed -->
  <path class="edge" d="M 720 240 C 780 240, 800 110, 820 110" marker-end="url(#arr49)"/>

  <!-- Running → Failed -->
  <path class="edge" d="M 720 270 L 820 270" marker-end="url(#arr49)"/>

  <!-- Running → Cancelled -->
  <path class="edge" d="M 720 290 C 780 290, 800 430, 820 430" marker-end="url(#arr49)"/>

  <!-- Queued → Cancelled -->
  <path class="edge" d="M 280 310 C 280 380, 800 410, 820 425" marker-end="url(#arr49)"/>

  <!-- WaitingForInput → Cancelled -->
  <path class="edge" d="M 420 470 C 600 470, 800 440, 820 435" marker-end="url(#arr49)"/>

  <!-- Terminals → End -->
  <path class="edge" d="M 1020 110 C 1080 110, 1100 240, 1120 260" marker-end="url(#arr49)"/>
  <path class="edge" d="M 1020 270 L 1118 270" marker-end="url(#arr49)"/>
  <path class="edge" d="M 1020 430 C 1080 430, 1100 290, 1120 280" marker-end="url(#arr49)"/>
</svg>
