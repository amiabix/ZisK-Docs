<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1280 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 15px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 15px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.5; }
.n-out text.name { fill: #15161D; font-weight: 700; font-size: 15px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }
.tree { fill: none; stroke: #7E7F8C; stroke-width: 1.4; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.6; }
.tag-good { fill: #00B359; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; }
    ]]></style>
    <marker id="arr54" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
    <marker id="arr54-tree" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#7E7F8C"/></marker>
  </defs>

  <!-- Level 1: billions of guest steps -->
  <g class="n-art" transform="translate(40,40)">
    <rect width="660" height="80" rx="8"/>
    <text class="kind" x="330" y="24" text-anchor="middle">execution</text>
    <text class="name" x="330" y="54" text-anchor="middle">billions of guest steps</text>
  </g>

  <!-- Tree connector to level 2 -->
  <path class="tree" d="M 100 120 L 100 180 L 178 180" marker-end="url(#arr54-tree)"/>

  <!-- Level 2 -->
  <g class="n-art" transform="translate(180,150)">
    <rect width="620" height="60" rx="8"/>
    <text class="kind" x="310" y="22" text-anchor="middle">trace splitting</text>
    <text class="name" x="310" y="46" text-anchor="middle">many per-chip segments</text>
  </g>

  <!-- Tree connector to level 3 -->
  <path class="tree" d="M 240 210 L 240 270 L 318 270" marker-end="url(#arr54-tree)"/>

  <!-- Level 3 -->
  <g class="n-art" transform="translate(320,240)">
    <rect width="600" height="60" rx="8"/>
    <text class="kind" x="300" y="22" text-anchor="middle">proof leaves</text>
    <text class="name" x="300" y="46" text-anchor="middle">many per-segment STARK proofs</text>
  </g>

  <!-- Tree connector to level 4 -->
  <path class="tree" d="M 380 300 L 380 360 L 458 360" marker-end="url(#arr54-tree)"/>

  <!-- Level 4 -->
  <g class="n-chip" transform="translate(460,330)">
    <rect width="580" height="60" rx="8"/>
    <text class="kind" x="290" y="22" text-anchor="middle">fold</text>
    <text class="name" x="290" y="46" text-anchor="middle">recursive aggregation tree</text>
  </g>

  <!-- Tree connector to level 5 -->
  <path class="tree" d="M 520 390 L 520 450 L 598 450" marker-end="url(#arr54-tree)"/>

  <!-- Level 5: one root proof -->
  <g class="n-out" transform="translate(600,420)">
    <rect width="320" height="60" rx="8"/>
    <text class="kind" x="160" y="22" text-anchor="middle">root</text>
    <text class="name" x="160" y="46" text-anchor="middle">one root proof</text>
  </g>

  <!-- Final arrow → verified -->
  <g class="n-out" transform="translate(960,420)">
    <rect width="280" height="60" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">terminal</text>
    <text class="name" x="140" y="46" text-anchor="middle">verified · ms</text>
  </g>
  <path class="edge" d="M 920 450 L 960 450" marker-end="url(#arr54)"/>
  <text class="tag-good" x="940" y="412" text-anchor="middle">verify</text>

  <!-- Bottom caption: full collapsed picture -->
  <text class="kind" x="640" y="570" text-anchor="middle" style="font-family:'IBM Plex Mono',monospace;font-size:11px;fill:#7E7F8C;">complexity collapses · prover work asymmetric to verifier work</text>
</svg>
