<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1480 520" xmlns="http://www.w3.org/2000/svg">
          <defs>
<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.mono { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; }

.n-chip rect, .n-chip polygon { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }

.n-dec polygon { fill: #FFFFFF; stroke: #007755; stroke-width: 1.5; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 14px; }

.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }

.subgraph rect { fill: rgba(110,91,224,0.04); stroke: #6E5BE0; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph.vm rect { fill: rgba(0,179,89,0.04); stroke: #007755; }
.subgraph text.label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #6E5BE0; font-weight: 600; }
.subgraph.vm text.label { fill: #007755; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-self { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9.5px; fill: #7E7F8C; letter-spacing: 0.1em; }
]]></style><marker id="arr17" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker></defs>

          <!-- 6 participants evenly spaced. Lifelines: 130, 350, 570, 790, 1030, 1330. Wider gap before A & Coord (group separator). -->
          <g class="n-chip" transform="translate(40,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Leaf 1 (Main seg 0)</text></g>
          <g class="n-chip" transform="translate(260,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Leaf 2 (Memory seg 0)</text></g>
          <g class="n-chip" transform="translate(480,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Leaf 3 (SHA-256 seg 0)</text></g>
          <g class="n-chip" transform="translate(700,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Leaf 4 (Base ops seg 0)</text></g>
          <g class="n-chip" transform="translate(940,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Aggregation tree</text></g>
          <g class="n-chip" transform="translate(1240,20)"><rect width="180" height="50" rx="6"/><text class="name" x="90" y="32" text-anchor="middle">Coordinator</text></g>

          <line class="seq-life" x1="130" y1="70" x2="130" y2="500"/>
          <line class="seq-life" x1="350" y1="70" x2="350" y2="500"/>
          <line class="seq-life" x1="570" y1="70" x2="570" y2="500"/>
          <line class="seq-life" x1="790" y1="70" x2="790" y2="500"/>
          <line class="seq-life" x1="1030" y1="70" x2="1030" y2="500"/>
          <line class="seq-life" x1="1330" y1="70" x2="1330" y2="500"/>

          <text class="seq-step-num" x="0" y="118">01</text>
          <path class="seq-msg-dashed" d="M 130 120 L 1329 120" marker-end="url(#arr17)"/>
          <text class="seq-msg-label" x="730" y="112" text-anchor="middle">ready (s₁, c₁)</text>

          <text class="seq-step-num" x="0" y="158">02</text>
          <path class="seq-msg-dashed" d="M 350 160 L 1329 160" marker-end="url(#arr17)"/>
          <text class="seq-msg-label" x="840" y="152" text-anchor="middle">ready (s₂, c₂)</text>

          <text class="seq-step-num" x="0" y="208">03</text>
          <path class="seq-msg" d="M 1330 210 L 1031 210" marker-end="url(#arr17)"/>
          <text class="seq-msg-label" x="1180" y="202" text-anchor="middle">aggregate L1 + L2</text>

          <text class="seq-step-num" x="0" y="258">04</text>
          <path class="seq-msg-dashed" d="M 570 260 L 1329 260" marker-end="url(#arr17)"/>
          <text class="seq-msg-label" x="950" y="252" text-anchor="middle">ready (s₃, c₃)</text>

          <text class="seq-step-num" x="0" y="298">05</text>
          <path class="seq-msg-dashed" d="M 790 300 L 1329 300" marker-end="url(#arr17)"/>
          <text class="seq-msg-label" x="1060" y="292" text-anchor="middle">ready (s₄, c₄)</text>

          <text class="seq-step-num" x="0" y="338">06</text>
          <path class="seq-msg" d="M 1330 340 L 1031 340" marker-end="url(#arr17)"/>
          <text class="seq-msg-label" x="1180" y="332" text-anchor="middle">aggregate L3 + L4</text>

          <g class="seq-note">
            <rect x="920" y="358" width="220" height="42"/>
            <text x="1030" y="378" text-anchor="middle">now two sub-proofs</text>
            <text x="1030" y="393" text-anchor="middle">are ready</text>
          </g>

          <text class="seq-step-num" x="0" y="428">07</text>
          <path class="seq-msg" d="M 1330 430 L 1031 430" marker-end="url(#arr17)"/>
          <text class="seq-msg-label" x="1180" y="422" text-anchor="middle">aggregate (L1+L2) and (L3+L4)</text>
        </svg>
