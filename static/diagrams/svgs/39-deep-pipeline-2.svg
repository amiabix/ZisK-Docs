<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1500 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 13px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 13px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
    ]]></style>
    <marker id="arr39" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-chip" transform="translate(20,50)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">step 1</text><text class="name" x="100" y="50" text-anchor="middle">Emulation</text></g>
  <g class="n-chip" transform="translate(260,50)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">step 2</text><text class="name" x="110" y="50" text-anchor="middle">Witness planning</text></g>
  <g class="n-chip" transform="translate(520,50)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">step 3</text><text class="name" x="110" y="50" text-anchor="middle">Trace generation</text></g>
  <g class="n-chip" transform="translate(780,50)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">step 4</text><text class="name" x="110" y="50" text-anchor="middle">Per-AIR proving</text></g>
  <g class="n-chip" transform="translate(1040,50)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">step 5</text><text class="name" x="100" y="50" text-anchor="middle">Aggregation</text></g>
  <g class="n-out" transform="translate(1280,50)"><rect width="180" height="80" rx="8"/><text class="kind" x="90" y="22" text-anchor="middle">step 6</text><text class="name" x="90" y="50" text-anchor="middle">Root proof</text></g>

  <path class="edge" d="M 220 90 L 260 90" marker-end="url(#arr39)"/>
  <path class="edge" d="M 480 90 L 520 90" marker-end="url(#arr39)"/>
  <path class="edge" d="M 740 90 L 780 90" marker-end="url(#arr39)"/>
  <path class="edge" d="M 1000 90 L 1040 90" marker-end="url(#arr39)"/>
  <path class="edge" d="M 1240 90 L 1280 90" marker-end="url(#arr39)"/>
</svg>
