<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
          <defs>
<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.mono { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; }

.n-chip rect, .n-chip polygon { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }

.n-dec polygon { fill: #FFFFFF; stroke: #007755; stroke-width: 1.5; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 14px; }

.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }

.subgraph rect { fill: rgba(110,91,224,0.04); stroke: #6E5BE0; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph.vm rect { fill: rgba(0,179,89,0.04); stroke: #007755; }
.subgraph text.label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #6E5BE0; font-weight: 600; }
.subgraph.vm text.label { fill: #007755; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-self { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9.5px; fill: #7E7F8C; letter-spacing: 0.1em; }
]]></style><marker id="arr8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker></defs>

          <g class="n-chip" transform="translate(60,20)"><rect width="160" height="50" rx="6"/><text class="name" x="80" y="32" text-anchor="middle">Main chip</text></g>
          <g class="n-chip" transform="translate(330,20)"><rect width="160" height="50" rx="6"/><text class="name" x="80" y="32" text-anchor="middle">ROM chip</text></g>
          <g class="n-chip" transform="translate(600,20)"><rect width="160" height="50" rx="6"/><text class="name" x="80" y="32" text-anchor="middle">Memory chip</text></g>
          <g class="n-chip" transform="translate(870,20)"><rect width="160" height="50" rx="6"/><text class="name" x="80" y="32" text-anchor="middle">Arith chip</text></g>

          <line class="seq-life" x1="140" y1="70" x2="140" y2="700"/>
          <line class="seq-life" x1="410" y1="70" x2="410" y2="700"/>
          <line class="seq-life" x1="680" y1="70" x2="680" y2="700"/>
          <line class="seq-life" x1="950" y1="70" x2="950" y2="700"/>

          <!-- Note over Main -->
          <g class="seq-note">
            <rect x="60" y="90" width="160" height="28"/>
            <text x="140" y="109" text-anchor="middle">row r in Main trace</text>
          </g>

          <text class="seq-step-num" x="20" y="148">01</text>
          <path class="seq-msg" d="M 140 150 L 409 150" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="275" y="142" text-anchor="middle">ROM Bus: "what's the instruction at pc?"</text>

          <text class="seq-step-num" x="20" y="188">02</text>
          <path class="seq-msg-dashed" d="M 410 190 L 151 190" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="275" y="182" text-anchor="middle">"add x1, x2 → x5"</text>

          <text class="seq-step-num" x="20" y="228">03</text>
          <path class="seq-msg" d="M 140 230 L 679 230" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="410" y="222" text-anchor="middle">Memory Bus: "read regs[1]"</text>

          <text class="seq-step-num" x="20" y="268">04</text>
          <path class="seq-msg-dashed" d="M 680 270 L 151 270" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="410" y="262" text-anchor="middle">17</text>

          <text class="seq-step-num" x="20" y="308">05</text>
          <path class="seq-msg" d="M 140 310 L 679 310" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="410" y="302" text-anchor="middle">Memory Bus: "read regs[2]"</text>

          <text class="seq-step-num" x="20" y="348">06</text>
          <path class="seq-msg-dashed" d="M 680 350 L 151 350" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="410" y="342" text-anchor="middle">42</text>

          <text class="seq-step-num" x="20" y="388">07</text>
          <path class="seq-msg" d="M 140 390 L 949 390" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="540" y="382" text-anchor="middle">Op Bus: "add(17, 42)"</text>

          <text class="seq-step-num" x="20" y="428">08</text>
          <path class="seq-msg-dashed" d="M 950 430 L 151 430" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="540" y="422" text-anchor="middle">(59, flag=0)</text>

          <text class="seq-step-num" x="20" y="468">09</text>
          <path class="seq-msg" d="M 140 470 L 679 470" marker-end="url(#arr8)"/>
          <text class="seq-msg-label" x="410" y="462" text-anchor="middle">Memory Bus: "write regs[5] = 59"</text>

          <g class="seq-note">
            <rect x="60" y="500" width="160" height="28"/>
            <text x="140" y="519" text-anchor="middle">row r is complete</text>
          </g>
        </svg>
