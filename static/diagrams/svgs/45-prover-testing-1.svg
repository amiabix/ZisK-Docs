<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1100 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-msg-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #7E7F8C; letter-spacing: 0.1em; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #15161D; }
    ]]></style>
    <marker id="arr45" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-chip" transform="translate(160,20)"><rect width="240" height="50" rx="6"/><text class="name" x="120" y="32" text-anchor="middle">Test host</text></g>
  <g class="n-chip" transform="translate(700,20)"><rect width="240" height="50" rx="6"/><text class="name" x="120" y="32" text-anchor="middle">Coordinator</text></g>

  <line class="seq-life" x1="280" y1="70" x2="280" y2="440"/>
  <line class="seq-life" x1="820" y1="70" x2="820" y2="440"/>

  <text class="seq-step-num" x="40" y="118">01</text>
  <path class="seq-msg" d="M 280 120 L 819 120" marker-end="url(#arr45)"/>
  <text class="seq-msg-label" x="550" y="112" text-anchor="middle">setup(PROGRAM)</text>

  <text class="seq-step-num" x="40" y="178">02</text>
  <path class="seq-msg-dashed" d="M 820 180 L 291 180" marker-end="url(#arr45)"/>
  <text class="seq-msg-label" x="550" y="172" text-anchor="middle">ok</text>

  <text class="seq-step-num" x="40" y="248">03</text>
  <path class="seq-msg" d="M 280 250 L 819 250" marker-end="url(#arr45)"/>
  <text class="seq-msg-label" x="550" y="242" text-anchor="middle">prove(PROGRAM, input)</text>

  <text class="seq-step-num" x="40" y="318">04</text>
  <path class="seq-msg-dashed" d="M 820 320 L 291 320" marker-end="url(#arr45)"/>
  <text class="seq-msg-label" x="550" y="312" text-anchor="middle">proof</text>

  <g class="seq-note">
    <rect x="160" y="360" width="240" height="40"/>
    <text x="280" y="385" text-anchor="middle">proof.verify() (local)</text>
  </g>
</svg>
