<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 900 1080" xmlns="http://www.w3.org/2000/svg">
          <defs>
<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.mono { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; }

.n-chip rect, .n-chip polygon { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }

.n-dec polygon { fill: #FFFFFF; stroke: #007755; stroke-width: 1.5; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 14px; }

.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }

.subgraph rect { fill: rgba(110,91,224,0.04); stroke: #6E5BE0; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph.vm rect { fill: rgba(0,179,89,0.04); stroke: #007755; }
.subgraph text.label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #6E5BE0; font-weight: 600; }
.subgraph.vm text.label { fill: #007755; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-self { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9.5px; fill: #7E7F8C; letter-spacing: 0.1em; }
]]></style><marker id="arr19" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker></defs>

          <g class="n-chip" transform="translate(330,20)"><rect width="240" height="80" rx="8"/><text class="kind" x="120" y="22" text-anchor="middle">phase 0</text><text class="name" x="120" y="48" text-anchor="middle">Compile</text><text class="sub" x="120" y="66" text-anchor="middle">one-time per ELF</text></g>
          <g class="n-chip" transform="translate(330,140)"><rect width="240" height="80" rx="8"/><text class="kind" x="120" y="22" text-anchor="middle">phase 1</text><text class="name" x="120" y="48" text-anchor="middle">Setup</text><text class="sub" x="120" y="66" text-anchor="middle">one-time per ELF</text></g>
          <g class="n-chip" transform="translate(330,260)"><rect width="240" height="80" rx="8"/><text class="kind" x="120" y="22" text-anchor="middle">phase 2</text><text class="name" x="120" y="48" text-anchor="middle">Execute</text><text class="sub" x="120" y="66" text-anchor="middle">optional sanity check</text></g>

          <!-- Prove subgraph -->
          <g class="subgraph vm">
            <rect x="240" y="380" width="420" height="500" rx="12"/>
            <text class="label" x="260" y="404">Phase 3 · Prove (the expensive stage)</text>
          </g>
          <g class="n-chip" transform="translate(330,430)"><rect width="240" height="60" rx="8"/><text class="kind" x="120" y="20" text-anchor="middle">3a</text><text class="name" x="120" y="42" text-anchor="middle">Emulation</text></g>
          <g class="n-chip" transform="translate(330,510)"><rect width="240" height="60" rx="8"/><text class="kind" x="120" y="20" text-anchor="middle">3b</text><text class="name" x="120" y="42" text-anchor="middle">Witness planning</text></g>
          <g class="n-chip" transform="translate(330,590)"><rect width="240" height="60" rx="8"/><text class="kind" x="120" y="20" text-anchor="middle">3c</text><text class="name" x="120" y="42" text-anchor="middle">Trace generation</text></g>
          <g class="n-chip" transform="translate(330,670)"><rect width="240" height="60" rx="8"/><text class="kind" x="120" y="20" text-anchor="middle">3d</text><text class="name" x="120" y="42" text-anchor="middle">Per-chip-segment proving</text></g>
          <g class="n-chip" transform="translate(330,750)"><rect width="240" height="60" rx="8"/><text class="kind" x="120" y="20" text-anchor="middle">3e</text><text class="name" x="120" y="42" text-anchor="middle">Aggregation</text></g>
          <g class="n-chip" transform="translate(330,830)"><rect width="240" height="40" rx="8"/><text class="name" x="120" y="26" text-anchor="middle">3f Root proof</text></g>

          <g class="n-chip" transform="translate(330,910)"><rect width="240" height="60" rx="8"/><text class="kind" x="120" y="20" text-anchor="middle">phase 4</text><text class="name" x="120" y="42" text-anchor="middle">Wrap (optional)</text></g>
          <g class="n-out" transform="translate(330,1000)"><rect width="240" height="60" rx="8"/><text class="kind" x="120" y="20" text-anchor="middle">phase 5</text><text class="name" x="120" y="42" text-anchor="middle">Verify (milliseconds)</text></g>

          <!-- Edges -->
          <path class="edge" d="M 450 100 L 450 140" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 220 L 450 260" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 340 L 450 430" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 490 L 450 510" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 570 L 450 590" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 650 L 450 670" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 730 L 450 750" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 810 L 450 830" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 880 L 450 910" marker-end="url(#arr19)"/>
          <path class="edge" d="M 450 970 L 450 1000" marker-end="url(#arr19)"/>
        </svg>
