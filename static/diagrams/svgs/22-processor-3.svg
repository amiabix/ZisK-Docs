<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1480 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }
    ]]></style>
    <marker id="arr22" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <!-- Sources column (far left) -->
  <g class="n-art" transform="translate(40,40)">
    <rect width="200" height="70" rx="8"/>
    <text class="kind" x="100" y="22" text-anchor="middle">source</text>
    <text class="name" x="100" y="48" text-anchor="middle">immediate</text>
  </g>
  <g class="n-art" transform="translate(40,230)">
    <rect width="200" height="70" rx="8"/>
    <text class="kind" x="100" y="22" text-anchor="middle">source</text>
    <text class="name" x="100" y="48" text-anchor="middle">memory</text>
  </g>
  <g class="n-art" transform="translate(40,420)">
    <rect width="200" height="100" rx="8"/>
    <text class="kind" x="100" y="22" text-anchor="middle">source</text>
    <text class="name" x="100" y="48" text-anchor="middle">RISC-V registers</text>
    <text class="sub" x="100" y="68" text-anchor="middle">x0 ... x31</text>
  </g>

  <!-- Operand registers a, b -->
  <g class="n-chip" transform="translate(360,150)">
    <rect width="180" height="70" rx="8"/>
    <text class="kind" x="90" y="22" text-anchor="middle">register</text>
    <text class="name" x="90" y="48" text-anchor="middle">a</text>
  </g>
  <g class="n-chip" transform="translate(360,330)">
    <rect width="180" height="70" rx="8"/>
    <text class="kind" x="90" y="22" text-anchor="middle">register</text>
    <text class="name" x="90" y="48" text-anchor="middle">b</text>
  </g>

  <!-- Operation -->
  <g class="n-chip" transform="translate(660,230)">
    <rect width="280" height="80" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">operation</text>
    <text class="name" x="140" y="52" text-anchor="middle">(c, flag) = op(a, b)</text>
  </g>

  <!-- Result registers c, flag -->
  <g class="n-chip" transform="translate(1060,150)">
    <rect width="180" height="70" rx="8"/>
    <text class="kind" x="90" y="22" text-anchor="middle">register</text>
    <text class="name" x="90" y="48" text-anchor="middle">c</text>
  </g>
  <g class="n-chip" transform="translate(1060,330)">
    <rect width="180" height="70" rx="8"/>
    <text class="kind" x="90" y="22" text-anchor="middle">register</text>
    <text class="name" x="90" y="48" text-anchor="middle">flag</text>
  </g>

  <!-- Sinks (far right): memory, regs (re-uses) -->
  <g class="n-art" transform="translate(1280,140)">
    <rect width="160" height="80" rx="8"/>
    <text class="kind" x="80" y="22" text-anchor="middle">store</text>
    <text class="name" x="80" y="50" text-anchor="middle">memory</text>
  </g>
  <g class="n-art" transform="translate(1280,260)">
    <rect width="160" height="80" rx="8"/>
    <text class="kind" x="80" y="22" text-anchor="middle">store</text>
    <text class="name" x="80" y="50" text-anchor="middle">RISC-V regs</text>
  </g>

  <!-- Source → a -->
  <path class="edge" d="M 240 75 C 300 75, 320 185, 360 185" marker-end="url(#arr22)"/>
  <path class="edge" d="M 240 265 C 300 265, 320 185, 360 185" marker-end="url(#arr22)"/>
  <path class="edge" d="M 240 470 C 300 470, 320 185, 360 185" marker-end="url(#arr22)"/>

  <!-- Source → b -->
  <path class="edge" d="M 240 75 C 300 75, 320 365, 360 365" marker-end="url(#arr22)"/>
  <path class="edge" d="M 240 265 C 300 265, 320 365, 360 365" marker-end="url(#arr22)"/>
  <path class="edge" d="M 240 470 C 300 470, 320 365, 360 365" marker-end="url(#arr22)"/>

  <!-- a, b → op -->
  <path class="edge" d="M 540 185 C 610 185, 620 270, 660 270" marker-end="url(#arr22)"/>
  <path class="edge" d="M 540 365 C 610 365, 620 270, 660 270" marker-end="url(#arr22)"/>

  <!-- op → c, flag -->
  <path class="edge" d="M 940 250 C 1010 250, 1020 185, 1060 185" marker-end="url(#arr22)"/>
  <path class="edge" d="M 940 290 C 1010 290, 1020 365, 1060 365" marker-end="url(#arr22)"/>

  <!-- c → memory + regs -->
  <path class="edge" d="M 1240 185 C 1260 185, 1270 180, 1280 180" marker-end="url(#arr22)"/>
  <path class="edge" d="M 1240 200 C 1260 200, 1270 300, 1280 300" marker-end="url(#arr22)"/>
</svg>
