<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 13px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }
    ]]></style>
    <marker id="arr35" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-chip" transform="translate(40,60)">
    <rect width="380" height="160" rx="8"/>
    <text class="kind" x="190" y="28" text-anchor="middle">row r · sender</text>
    <text class="sub" x="190" y="64" text-anchor="middle">e(r) = (5, 17, 'add')</text>
    <text class="sub" x="190" y="92" text-anchor="middle">m(r) = +1</text>
    <text class="name" x="190" y="130" text-anchor="middle">send</text>
  </g>

  <g class="n-chip" transform="translate(780,60)">
    <rect width="380" height="160" rx="8"/>
    <text class="kind" x="190" y="28" text-anchor="middle">row r' · receiver</text>
    <text class="sub" x="190" y="64" text-anchor="middle">e(r') = (5, 17, 'add')</text>
    <text class="sub" x="190" y="92" text-anchor="middle">m(r') = -1</text>
    <text class="name" x="190" y="130" text-anchor="middle">receive</text>
  </g>

  <path class="edge" d="M 420 140 L 780 140" marker-end="url(#arr35)"/>
  <rect class="edge-label-bg" x="565" y="125" width="70" height="18" rx="3"/>
  <text class="edge-label" x="600" y="138" text-anchor="middle">bus b</text>
</svg>
