<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1300 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 13px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
    ]]></style>
    <marker id="arr36" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-chip" transform="translate(40,40)">
    <rect width="280" height="100" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">AIR 1</text>
    <text class="name" x="140" y="48" text-anchor="middle">local constraints</text>
    <text class="sub" x="140" y="70" text-anchor="middle">+ LogUp partial sum</text>
  </g>
  <g class="n-chip" transform="translate(40,220)">
    <rect width="280" height="100" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">AIR 2</text>
    <text class="name" x="140" y="48" text-anchor="middle">local constraints</text>
    <text class="sub" x="140" y="70" text-anchor="middle">+ LogUp partial sum</text>
  </g>
  <g class="n-chip" transform="translate(40,400)">
    <rect width="280" height="100" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">AIR i</text>
    <text class="name" x="140" y="48" text-anchor="middle">local constraints</text>
    <text class="sub" x="140" y="70" text-anchor="middle">+ LogUp partial sum</text>
  </g>

  <g class="n-art" transform="translate(500,60)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">partial sum</text><text class="name" x="100" y="48" text-anchor="middle">s₁ ∈ K</text></g>
  <g class="n-art" transform="translate(500,240)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">partial sum</text><text class="name" x="100" y="48" text-anchor="middle">s₂ ∈ K</text></g>
  <g class="n-art" transform="translate(500,420)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">partial sum</text><text class="name" x="100" y="48" text-anchor="middle">s_i ∈ K</text></g>

  <g class="n-out" transform="translate(950,220)">
    <rect width="280" height="100" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">global check</text>
    <text class="name" x="140" y="60" text-anchor="middle">Σᵢ s_i = 0</text>
  </g>

  <path class="edge" d="M 320 90 L 500 90" marker-end="url(#arr36)"/>
  <path class="edge" d="M 320 270 L 500 270" marker-end="url(#arr36)"/>
  <path class="edge" d="M 320 450 L 500 450" marker-end="url(#arr36)"/>

  <path class="edge" d="M 700 90 C 820 90, 870 250, 950 260" marker-end="url(#arr36)"/>
  <path class="edge" d="M 700 270 C 820 270, 870 270, 950 270" marker-end="url(#arr36)"/>
  <path class="edge" d="M 700 450 C 820 450, 870 290, 950 280" marker-end="url(#arr36)"/>
</svg>
