<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg">
          <defs>
<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.mono { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; }

.n-chip rect, .n-chip polygon { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-chip text.sub { fill: #B9B9C5; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10px; }

.n-out rect { fill: #B9F0CF; stroke: #00B359; stroke-width: 1.2; }
.n-out text.name { fill: #15161D; font-weight: 600; font-size: 14px; }
.n-out text.kind { fill: #007755; font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }

.n-dec polygon { fill: #FFFFFF; stroke: #007755; stroke-width: 1.5; }
.n-dec rect { fill: #F3F3F2; stroke: #007755; stroke-width: 1.5; }
.n-dec text.name { fill: #15161D; font-weight: 600; font-size: 14px; }

.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
.edge-dim { fill: none; stroke: #7E7F8C; stroke-width: 1.3; stroke-dasharray: 4 4; }
.edge-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #4A4C59; }
.edge-label-bg { fill: #FFFFFF; stroke: none; }

.subgraph rect { fill: rgba(110,91,224,0.04); stroke: #6E5BE0; stroke-width: 1; stroke-dasharray: 6 4; }
.subgraph.vm rect { fill: rgba(0,179,89,0.04); stroke: #007755; }
.subgraph text.label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #6E5BE0; font-weight: 600; }
.subgraph.vm text.label { fill: #007755; }

.seq-life { stroke: #B9B9C5; stroke-width: 1; stroke-dasharray: 3 4; }
.seq-msg { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-dashed { fill: none; stroke: #15161D; stroke-width: 1.4; stroke-dasharray: 5 4; }
.seq-self { fill: none; stroke: #15161D; stroke-width: 1.4; }
.seq-msg-label { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-note rect { fill: rgba(0,179,89,0.07); stroke: #007755; stroke-width: 1; rx: 4; }
.seq-note text { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 11px; fill: #15161D; }
.seq-step-num { font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace; font-size: 9.5px; fill: #7E7F8C; letter-spacing: 0.1em; }
]]></style><marker id="arr15" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker></defs>

          <g class="n-art" transform="translate(500,20)"><rect width="200" height="80" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">artifact</text><text class="name" x="100" y="50" text-anchor="middle">Execution log</text></g>

          <!-- Witness gens -->
          <g class="n-chip" transform="translate(60,200)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">witness gen</text><text class="name" x="110" y="50" text-anchor="middle">Main</text></g>
          <g class="n-chip" transform="translate(340,200)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">witness gen</text><text class="name" x="110" y="50" text-anchor="middle">Memory</text></g>
          <g class="n-chip" transform="translate(620,200)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">witness gen</text><text class="name" x="110" y="50" text-anchor="middle">SHA-256</text></g>
          <g class="n-chip" transform="translate(900,200)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">witness gen</text><text class="name" x="110" y="50" text-anchor="middle">Base ops</text></g>

          <!-- Traces -->
          <g class="n-art" transform="translate(60,400)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">trace</text><text class="name" x="110" y="50" text-anchor="middle">Main trace</text></g>
          <g class="n-art" transform="translate(340,400)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">trace</text><text class="name" x="110" y="50" text-anchor="middle">Memory trace</text></g>
          <g class="n-art" transform="translate(620,400)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">trace</text><text class="name" x="110" y="50" text-anchor="middle">SHA-256 trace</text></g>
          <g class="n-art" transform="translate(900,400)"><rect width="220" height="80" rx="8"/><text class="kind" x="110" y="22" text-anchor="middle">trace</text><text class="name" x="110" y="50" text-anchor="middle">Base ops trace</text></g>

          <!-- Edges Log -> WG: short stem down, horizontal rail at y=150, vertical drops to each WG -->
          <path class="edge" fill="none" d="M 600 100 L 600 150"/>
          <path class="edge" fill="none" d="M 170 150 L 1010 150"/>
          <path class="edge" d="M 170 150 L 170 198" marker-end="url(#arr15)"/>
          <path class="edge" d="M 450 150 L 450 198" marker-end="url(#arr15)"/>
          <path class="edge" d="M 730 150 L 730 198" marker-end="url(#arr15)"/>
          <path class="edge" d="M 1010 150 L 1010 198" marker-end="url(#arr15)"/>

          <!-- Edges WG -> Trace (vertical) -->
          <path class="edge" d="M 170 280 L 170 400" marker-end="url(#arr15)"/>
          <path class="edge" d="M 450 280 L 450 400" marker-end="url(#arr15)"/>
          <path class="edge" d="M 730 280 L 730 400" marker-end="url(#arr15)"/>
          <path class="edge" d="M 1010 280 L 1010 400" marker-end="url(#arr15)"/>
        </svg>
