<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1480 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

.panel-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; fill: #4A4C59; font-weight: 600; }
.panel-bg { fill: #FFFFFF; stroke: #D9DCE3; stroke-width: 1; stroke-dasharray: 6 4; }

.row-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4A4C59; }
.frame-index { font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; font-weight: 700; fill: #15161D; }

.byte-cell rect { stroke: #D9DCE3; stroke-width: 1; }
.byte-cell text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; fill: #15161D; font-weight: 600; }
.byte-cell-dim text { fill: #B9B9C5; }

.cell-f1 { fill: rgba(0,119,85,0.12); }
.cell-f1-strong { fill: rgba(0,119,85,0.32); }
.cell-f2 { fill: rgba(199,163,0,0.12); }
.cell-f2-strong { fill: rgba(199,163,0,0.32); }
.cell-f3 { fill: rgba(196,122,24,0.12); }
.cell-f3-strong { fill: rgba(196,122,24,0.32); }

.host-call { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; fill: #15161D; }
.host-call-bg rect { stroke-width: 1.5; fill: #FFFFFF; }
.host-call-bg.f1 rect { stroke: #007755; }
.host-call-bg.f2 rect { stroke: #C7A300; }
.host-call-bg.f3 rect { stroke: #C47A18; }

.dot.f1 { fill: #007755; }
.dot.f2 { fill: #C7A300; }
.dot.f3 { fill: #C47A18; }

.connector { fill: none; stroke-width: 1.4; }
.connector.f1 { stroke: #007755; }
.connector.f2 { stroke: #C7A300; }
.connector.f3 { stroke: #C47A18; }
    ]]></style>
    <marker id="arr-of1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#007755"/></marker>
    <marker id="arr-of2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#C7A300"/></marker>
    <marker id="arr-of3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#C47A18"/></marker>
  </defs>

  <!-- Guest Program panel (LEFT) -->
  <text class="panel-title" x="40" y="60">Guest Program</text>
  <rect class="panel-bg" x="40" y="80" width="500" height="280" rx="12"/>

  <g class="host-call-bg f1" transform="translate(70,110)">
    <rect width="440" height="60" rx="8"/>
    <circle class="dot f1" cx="36" cy="30" r="14"/>
    <text class="frame-index" x="36" y="36" text-anchor="middle" fill="#FFFFFF">①</text>
    <text class="host-call" x="80" y="36">io::commit::&lt;u8&gt;(83)</text>
  </g>

  <g class="host-call-bg f2" transform="translate(70,190)">
    <rect width="440" height="60" rx="8"/>
    <circle class="dot f2" cx="36" cy="30" r="14"/>
    <text class="frame-index" x="36" y="36" text-anchor="middle" fill="#FFFFFF">②</text>
    <text class="host-call" x="80" y="36">io::commit::&lt;u16&gt;(66)</text>
  </g>

  <g class="host-call-bg f3" transform="translate(70,270)">
    <rect width="440" height="60" rx="8"/>
    <circle class="dot f3" cx="36" cy="30" r="14"/>
    <text class="frame-index" x="36" y="36" text-anchor="middle" fill="#FFFFFF">③</text>
    <text class="host-call" x="80" y="36">io::commit::&lt;u16&gt;(93)</text>
  </g>

  <!-- Connectors -->
  <path class="connector f1" d="M 510 140 C 600 140, 660 130, 740 130" marker-end="url(#arr-of1)"/>
  <path class="connector f2" d="M 510 220 C 600 220, 660 210, 740 210" marker-end="url(#arr-of2)"/>
  <path class="connector f3" d="M 510 300 C 600 300, 660 290, 740 290" marker-end="url(#arr-of3)"/>

  <!-- Output Buffer panel (RIGHT) -->
  <text class="panel-title" x="740" y="60">Output Buffer</text>
  <rect class="panel-bg" x="740" y="80" width="700" height="280" rx="12"/>

  <!-- Slot 0 row -->
  <text class="frame-index" x="765" y="136">①</text>
  <text class="row-label" x="795" y="136">slot[0]</text>
  <g transform="translate(900,110)">
    <g class="byte-cell"><rect class="cell-f1-strong" x="0" y="0" width="120" height="40"/><text x="60" y="26" text-anchor="middle">53</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f1" x="120" y="0" width="120" height="40"/><text x="180" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f1" x="240" y="0" width="120" height="40"/><text x="300" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f1" x="360" y="0" width="120" height="40"/><text x="420" y="26" text-anchor="middle">00</text></g>
  </g>

  <!-- Slot 1 row -->
  <text class="frame-index" x="765" y="216">②</text>
  <text class="row-label" x="795" y="216">slot[1]</text>
  <g transform="translate(900,190)">
    <g class="byte-cell"><rect class="cell-f2-strong" x="0" y="0" width="120" height="40"/><text x="60" y="26" text-anchor="middle">42</text></g>
    <g class="byte-cell"><rect class="cell-f2-strong" x="120" y="0" width="120" height="40"/><text x="180" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f2" x="240" y="0" width="120" height="40"/><text x="300" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f2" x="360" y="0" width="120" height="40"/><text x="420" y="26" text-anchor="middle">00</text></g>
  </g>

  <!-- Slot 2 row -->
  <text class="frame-index" x="765" y="296">③</text>
  <text class="row-label" x="795" y="296">slot[2]</text>
  <g transform="translate(900,270)">
    <g class="byte-cell"><rect class="cell-f3-strong" x="0" y="0" width="120" height="40"/><text x="60" y="26" text-anchor="middle">5D</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="120" y="0" width="120" height="40"/><text x="180" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="240" y="0" width="120" height="40"/><text x="300" y="26" text-anchor="middle">00</text></g>
    <g class="byte-cell byte-cell-dim"><rect class="cell-f3" x="360" y="0" width="120" height="40"/><text x="420" y="26" text-anchor="middle">00</text></g>
  </g>

  <!-- Bottom legend -->
  <text class="row-label" x="900" y="390">strong fill = significant byte · dim fill = padding</text>
  <text class="row-label" x="900" y="408">each commit = one 32-bit LE slot (4 bytes), padded to slot width</text>
</svg>
