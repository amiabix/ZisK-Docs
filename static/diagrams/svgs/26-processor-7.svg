<?xml version="1.0" encoding="UTF-8"?>
<svg class="zisk" viewBox="0 0 1100 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
text { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.n-chip rect { fill: #2D2E3D; stroke: #15161D; stroke-width: 1; }
.n-chip text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-chip text.kind { fill: #B9B9C5; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art rect { fill: #007755; stroke: #00553D; stroke-width: 1; }
.n-art text.name { fill: #FFFFFF; font-weight: 600; font-size: 14px; }
.n-art text.kind { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.n-art text.sub { fill: #B9F0CF; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
.edge { fill: none; stroke: #15161D; stroke-width: 1.4; }
    ]]></style>
    <marker id="arr26" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15161D"/></marker>
  </defs>

  <g class="n-art" transform="translate(40,180)">
    <rect width="280" height="100" rx="8"/>
    <text class="kind" x="140" y="22" text-anchor="middle">RISC-V atomic</text>
    <text class="name" x="140" y="50" text-anchor="middle">A (32 bits)</text>
    <text class="sub" x="140" y="70" text-anchor="middle">expands to 4 ZisK insts</text>
  </g>

  <g class="n-chip" transform="translate(700,40)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">part 1</text><text class="name" x="100" y="44" text-anchor="middle">ZisK</text></g>
  <g class="n-chip" transform="translate(700,140)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">part 2</text><text class="name" x="100" y="44" text-anchor="middle">ZisK</text></g>
  <g class="n-chip" transform="translate(700,260)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">part 3</text><text class="name" x="100" y="44" text-anchor="middle">ZisK</text></g>
  <g class="n-chip" transform="translate(700,360)"><rect width="200" height="60" rx="8"/><text class="kind" x="100" y="22" text-anchor="middle">part 4</text><text class="name" x="100" y="44" text-anchor="middle">ZisK</text></g>

  <path class="edge" d="M 320 220 C 500 220, 600 70, 700 70" marker-end="url(#arr26)"/>
  <path class="edge" d="M 320 225 C 500 225, 600 170, 700 170" marker-end="url(#arr26)"/>
  <path class="edge" d="M 320 235 C 500 235, 600 290, 700 290" marker-end="url(#arr26)"/>
  <path class="edge" d="M 320 240 C 500 240, 600 390, 700 390" marker-end="url(#arr26)"/>
</svg>
